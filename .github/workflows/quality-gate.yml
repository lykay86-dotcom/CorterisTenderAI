name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: quality-gate (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      PYTHONUTF8: "1"
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Scan tracked files for secrets
        run: python scripts/check_repository_secrets.py

      - name: Ruff check
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format . --check

      - name: Mypy required contour
        run: python -m mypy

      - name: Offline credential isolation smoke
        run: >-
          python -m pytest -q
          tests/test_collector_provider_control.py::test_manager_exposes_all_sources_without_network
          tests/test_mos_supplier_diagnostic_script.py::test_mos_diagnostic_runs_from_scripts_path_without_app_error

      - name: Legacy database migration smoke
        run: python -m pytest -q tests/test_database_migrations_121.py tests/test_collector_schema_contract.py

      - name: Public API import smoke
        run: python -c "from app.ui.controllers import DashboardController; print(DashboardController.__name__)"

      - name: Headless composition-root smoke
        run: python -m pytest -q tests/test_bootstrap_tender_search_integration.py

      - name: Release and build contract smoke
        run: python -m pytest -q tests/test_build_release_contract.py tests/test_frozen_self_test.py

      - name: Full test suite
        run: python -m pytest -q

      - name: RM-154 canonical visual candidate
        if: matrix.python-version == '3.12'
        env:
          RM154_RENDERER_PROFILE: windows-latest-python312
        run: >-
          python -m scripts.rm154_visual_qa candidate
          --artifact-root rm154-visual-artifacts

      - name: Upload RM-154 visual review bundle
        if: matrix.python-version == '3.12' && always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: rm154-visual-candidate-python312
          path: rm154-visual-artifacts
          if-no-files-found: warn
          retention-days: 14

      - name: Audit installed dependencies
        run: python -m pip_audit --skip-editable
